name: Android Dev Internal App Sharing

on:
  push:
    branches:
      - chore/android-cicd
  workflow_dispatch:

concurrency:
  group: android-dev-internal-app-sharing
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: android-dev-internal

    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.1

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Restore node_modules cache
        id: cache_node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('yarn.lock', 'package.json', 'patches/**') }}

      - name: Install dependencies
        if: steps.cache_node_modules.outputs.cache-hit != 'true'
        run: yarn install --frozen-lockfile --prefer-offline

      - name: Restore Android local config
        shell: bash
        env:
          ANDROID_ENV_LOCAL: ${{ secrets.ANDROID_ENV_LOCAL }}
          ANDROID_GOOGLE_SERVICES_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$ANDROID_ENV_LOCAL" ]; then
            echo "ANDROID_ENV_LOCAL is not set"
            exit 1
          fi
          if [ -z "$ANDROID_GOOGLE_SERVICES_JSON" ]; then
            echo "ANDROID_GOOGLE_SERVICES_JSON is not set"
            exit 1
          fi

          printf '%s' "$ANDROID_ENV_LOCAL" > .env.local
          printf '%s' "$ANDROID_GOOGLE_SERVICES_JSON" > android/app/google-services.json

      - name: Build debug APK
        run: |
          chmod +x android/gradlew
          cd android
          ENVFILE=.env.local ./gradlew :app:assembleDebug --build-cache

      - name: Upload to Google Play internal app sharing
        id: upload_internal_sharing
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.padocorp.clubhouse.applicationId.debug
          releaseFiles: android/app/build/outputs/apk/debug/app-debug.apk
          tracks: internalsharing

      - name: Publish internal app sharing link
        if: ${{ steps.upload_internal_sharing.outputs.internalSharingDownloadUrl != '' }}
        shell: bash
        run: |
          {
            echo "## Android Internal App Sharing"
            echo ""
            echo "Branch: develop"
            echo "Build: debug APK"
            echo "Package: com.padocorp.clubhouse.applicationId.debug"
            echo ""
            echo "${{ steps.upload_internal_sharing.outputs.internalSharingDownloadUrl }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup local config
        if: always()
        run: |
          rm -f .env.local
          rm -f android/app/google-services.json
