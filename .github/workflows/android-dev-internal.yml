name: Android Dev Artifact Build

on:
  push:
    branches:
      - chore/android-cicd
  workflow_dispatch:

concurrency:
  group: android-dev-artifact-build
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: android-dev-internal

    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.1

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Restore node_modules cache
        id: cache_node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('yarn.lock', 'package.json', 'patches/**') }}

      - name: Install dependencies
        if: steps.cache_node_modules.outputs.cache-hit != 'true'
        run: yarn install --frozen-lockfile --prefer-offline

      - name: Restore Android local config
        shell: bash
        env:
          ANDROID_ENV_LOCAL: ${{ secrets.ANDROID_ENV_LOCAL }}
          ANDROID_GOOGLE_SERVICES_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
          ANDROID_DEBUG_KEYSTORE_BASE64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_ENV_LOCAL" ]; then
            echo "ANDROID_ENV_LOCAL is not set"
            exit 1
          fi
          if [ -z "$ANDROID_GOOGLE_SERVICES_JSON" ]; then
            echo "ANDROID_GOOGLE_SERVICES_JSON is not set"
            exit 1
          fi
          if [ -z "$ANDROID_DEBUG_KEYSTORE_BASE64" ]; then
            echo "ANDROID_DEBUG_KEYSTORE_BASE64 is not set"
            exit 1
          fi

          printf '%s' "$ANDROID_ENV_LOCAL" > .env.local
          printf '%s' "$ANDROID_GOOGLE_SERVICES_JSON" > android/app/google-services.json
          printf '%s' "$ANDROID_DEBUG_KEYSTORE_BASE64" | base64 --decode > android/app/debug.keystore
          chmod 600 android/app/debug.keystore

      - name: Build debug APK
        run: |
          chmod +x android/gradlew
          cd android
          ENVFILE=.env.local ./gradlew :app:assembleDebug --build-cache

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 7

      - name: Publish artifact summary
        shell: bash
        run: |
          {
            echo "## Android Debug Artifact"
            echo ""
            echo "Branch: ${GITHUB_REF_NAME}"
            echo "Build: debug APK"
            echo "Package: com.padocorp.clubhouse.applicationId.debug"
            echo "Artifact: android-debug-apk-${GITHUB_RUN_NUMBER}"
            echo "Retention: 7 days"
            echo ""
            echo "Download the APK from the Artifacts section of this workflow run."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup local config
        if: always()
        run: |
          rm -f .env.local
          rm -f android/app/google-services.json
          rm -f android/app/debug.keystore
