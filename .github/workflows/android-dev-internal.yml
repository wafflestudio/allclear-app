name: Android Internal Testing

on:
  push:
    branches:
      - develop
  workflow_dispatch:

concurrency:
  group: android-internal-testing
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.1

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 20
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Prepare upload keystore
        env:
          ANDROID_UPLOAD_KEYSTORE_B64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_B64 }}
        run: |
          printf '%s' "$ANDROID_UPLOAD_KEYSTORE_B64" | base64 --decode > android/app/clubhouse.keystore

      - name: Compute release metadata
        id: build_meta
        shell: bash
        run: |
          release_version_code=$((100000 + GITHUB_RUN_NUMBER))
          echo "release_version_code=${release_version_code}" >> "$GITHUB_OUTPUT"
          echo "release_name=internal ${release_version_code}" >> "$GITHUB_OUTPUT"

      - name: Prepare release notes
        shell: bash
        run: |
          mkdir -p .github/play/whatsnew
          cat > .github/play/whatsnew/whatsnew-ko-KR <<EOF
          develop 브랜치 자동 배포 빌드입니다.
          Run: #${GITHUB_RUN_NUMBER}
          Commit: ${GITHUB_SHA::7}
          EOF

      - name: Build release bundle
        env:
          ORG_GRADLE_PROJECT_MYAPP_UPLOAD_STORE_FILE: clubhouse.keystore
          ORG_GRADLE_PROJECT_MYAPP_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_STORE_PASSWORD }}
          ORG_GRADLE_PROJECT_MYAPP_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_MYAPP_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
        run: |
          chmod +x android/gradlew
          cd android
          ENVFILE=.env.prod ./gradlew :app:bundleRelease -PVERSION_CODE=${{ steps.build_meta.outputs.release_version_code }}

      - name: Upload to Google Play internal testing
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.padocorp.clubhouse.applicationId
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          releaseName: ${{ steps.build_meta.outputs.release_name }}
          whatsNewDirectory: .github/play/whatsnew

      - name: Cleanup keystore
        if: always()
        run: rm -f android/app/clubhouse.keystore
