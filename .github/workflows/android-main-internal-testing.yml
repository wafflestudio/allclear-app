name: Android Main Internal Testing

on:
  push:
    branches:
      - chore/android-cicd
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: android-main-internal
    env:
      ALLCLEAR_UPLOAD_STORE_FILE: ${{ secrets.ALLCLEAR_UPLOAD_STORE_FILE }}
      ORG_GRADLE_PROJECT_ALLCLEAR_UPLOAD_STORE_FILE: ${{ secrets.ALLCLEAR_UPLOAD_STORE_FILE }}
      ORG_GRADLE_PROJECT_ALLCLEAR_UPLOAD_KEY_ALIAS: ${{ secrets.ALLCLEAR_UPLOAD_KEY_ALIAS }}
      ORG_GRADLE_PROJECT_ALLCLEAR_UPLOAD_STORE_PASSWORD: ${{ secrets.ALLCLEAR_UPLOAD_STORE_PASSWORD }}
      ORG_GRADLE_PROJECT_ALLCLEAR_UPLOAD_KEY_PASSWORD: ${{ secrets.ALLCLEAR_UPLOAD_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.1

      - name: Setup Android environment
        uses: ./.github/actions/setup-android-env

      - name: Restore Android release config
        shell: bash
        env:
          ANDROID_ENV_PROD: ${{ secrets.ANDROID_ENV_PROD }}
          ANDROID_GOOGLE_SERVICES_JSON_PROD: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_PROD }}
          ALLCLEAR_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ALLCLEAR_UPLOAD_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_ENV_PROD" ]; then
            echo "ANDROID_ENV_PROD is not set"
            exit 1
          fi
          if [ -z "$ANDROID_GOOGLE_SERVICES_JSON_PROD" ]; then
            echo "ANDROID_GOOGLE_SERVICES_JSON_PROD is not set"
            exit 1
          fi
          if [ -z "$ALLCLEAR_UPLOAD_KEYSTORE_BASE64" ]; then
            echo "ALLCLEAR_UPLOAD_KEYSTORE_BASE64 is not set"
            exit 1
          fi
          if [ -z "$ALLCLEAR_UPLOAD_STORE_FILE" ]; then
            echo "ALLCLEAR_UPLOAD_STORE_FILE is not set"
            exit 1
          fi
          if [ -z "$ORG_GRADLE_PROJECT_ALLCLEAR_UPLOAD_KEY_ALIAS" ]; then
            echo "ALLCLEAR_UPLOAD_KEY_ALIAS is not set"
            exit 1
          fi
          if [ -z "$ORG_GRADLE_PROJECT_ALLCLEAR_UPLOAD_STORE_PASSWORD" ]; then
            echo "ALLCLEAR_UPLOAD_STORE_PASSWORD is not set"
            exit 1
          fi
          if [ -z "$ORG_GRADLE_PROJECT_ALLCLEAR_UPLOAD_KEY_PASSWORD" ]; then
            echo "ALLCLEAR_UPLOAD_KEY_PASSWORD is not set"
            exit 1
          fi

          printf '%s' "$ANDROID_ENV_PROD" > .env.prod
          printf '%s' "$ANDROID_GOOGLE_SERVICES_JSON_PROD" > android/app/google-services.json
          printf '%s' "$ALLCLEAR_UPLOAD_KEYSTORE_BASE64" | base64 --decode > "android/app/${ALLCLEAR_UPLOAD_STORE_FILE}"
          chmod 600 "android/app/${ALLCLEAR_UPLOAD_STORE_FILE}"

      - name: Compute version code
        shell: bash
        run: |
          version_code=$((100009 + GITHUB_RUN_NUMBER))
          echo "VERSION_CODE=${version_code}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=main internal ${version_code}" >> "$GITHUB_ENV"

      - name: Build release bundle
        run: |
          chmod +x android/gradlew
          cd android
          ENVFILE=../.env.prod ./gradlew :app:bundleRelease -PVERSION_CODE="${VERSION_CODE}" --build-cache

      - name: Upload to Google Play internal testing
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.padocorp.clubhouse.applicationId
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          releaseName: ${{ env.RELEASE_NAME }}

      - name: Publish build summary
        shell: bash
        run: |
          {
            echo "## Android Internal Testing"
            echo ""
            echo "Branch: main"
            echo "Build: release AAB"
            echo "Package: com.padocorp.clubhouse.applicationId"
            echo "Track: internal"
            echo "Version code: ${VERSION_CODE}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup local config
        if: always()
        run: |
          rm -f .env.prod
          rm -f android/app/google-services.json
          rm -f "android/app/${ALLCLEAR_UPLOAD_STORE_FILE}"
